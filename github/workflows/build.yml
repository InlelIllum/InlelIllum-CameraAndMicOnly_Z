# Сборка SensorsOff (только микрофон + камера) через GitHub Actions.
#
# Как запустить:
#   1. Залейте проект в свой репозиторий на GitHub.
#   2. Откройте вкладку Actions → выберите "Build APK" → Run workflow.
#   3. Через ~5-7 минут в разделе Artifacts появится файл app-release.apk.
#
# Если вы хотите, чтобы APK подписывался вашим собственным ключом
# (а не debug-ключом по умолчанию) — настройте Secrets в
# Settings → Secrets and variables → Actions:
#   KEYSTORE_BASE64  — base64-кодированный файл .keystore
#   KEYSTORE_PASSWORD — пароль от keystore
#   KEY_ALIAS         — алиас ключа
#   KEY_PASSWORD      — пароль от ключа
#
# Сгенерировать keystore можно командой (локально, на любом ПК с Java):
#   keytool -genkey -v -keystore release.keystore \
#     -alias sensors -keyalg RSA -keysize 2048 -validity 10000
#
# Закодировать в base64 для вставки в Secret:
#   base64 release.keystore > release.keystore.b64
#   (Windows PowerShell: [Convert]::ToBase64String([IO.File]::ReadAllBytes("release.keystore")))

name: Build APK

on:
  push:
    branches: [ "master", "main" ]
  pull_request:
    branches: [ "master", "main" ]
  workflow_dispatch:  # позволяет запустить вручную из вкладки Actions

jobs:
  build:
    name: Build release APK
    runs-on: ubuntu-latest

    steps:
      - name: Checkout source
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'
          cache: gradle

      - name: Set up Android SDK
        uses: android-actions/setup-android@v3
        with:
          packages: 'platform-tools build-tools;34.0.0'

      - name: Grant execute permission for gradlew
        run: chmod +x ./gradlew

      - name: Decode keystore from secrets (if configured)
        if: ${{ env.KEYSTORE_BASE64 != '' }}
        env:
          KEYSTORE_BASE64: ${{ secrets.KEYSTORE_BASE64 }}
        run: |
          echo "$KEYSTORE_BASE64" | base64 -d > release.keystore
          echo "KEYSTORE_PATH=$(pwd)/release.keystore" >> $GITHUB_ENV
        continue-on-error: false

      - name: Build release APK
        env:
          KEYSTORE_PATH: ${{ env.KEYSTORE_PATH }}
          KEYSTORE_PASSWORD: ${{ secrets.KEYSTORE_PASSWORD }}
          KEY_ALIAS: ${{ secrets.KEY_ALIAS }}
          KEY_PASSWORD: ${{ secrets.KEY_PASSWORD }}
        run: ./gradlew assembleRelease --no-daemon --stacktrace

      - name: Build debug APK (вдогонку, для удобства)
        run: ./gradlew assembleDebug --no-daemon

      - name: Upload release APK
        uses: actions/upload-artifact@v4
        with:
          name: SensorsOff-release-mic-cam-only
          path: app/build/outputs/apk/release/*.apk
          if-no-files-found: error
          retention-days: 30

      - name: Upload debug APK
        uses: actions/upload-artifact@v4
        with:
          name: SensorsOff-debug-mic-cam-only
          path: app/build/outputs/apk/debug/*.apk
          if-no-files-found: warn
          retention-days: 14
